<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV "IPTV SPORTS "</title>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>
        jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
			align-items: center;
        }
        #player {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16/9;
        }
        #channel-list {
            margin: 20px auto;
            max-width: 1200px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .channel {
    		cursor: pointer;
   	 		padding: 8px;
    		background: #222;
    		border: 1px solid #444;
    		border-radius: 8px;
    		text-align: center;
   			width: 130px;           
   		 	height: 80px;           
    		display: flex;
    		justify-content: center;
   			align-items: center;
    		transition: transform 0.2s;
    		overflow: hidden; 
        }
		.channel img {
 		    max-width: 100%;
 			max-height: 100%;
   			object-fit: contain; 
    		display: block;
        }
        .channel:hover {
            background: #000;
			transform: scale(1.05); 
        }
    </style>
</head>
<body>
    <h2 style="color:orange; text-align:center;">IPTV SPORTS </h2>
    <div id="player"></div>

    <div id="channel-list"></div>

    <script>
        const channels = [
		{
            name: "ASTRO PREMIER LEAGUE",
            logo: "https://www.lyngsat.com/logo/tv/aa/astro-premier-league-my.png",
            sources: [
                { file: "http://tv-premium-pro.com/wezqqszfr2/i7481xvrdf/1163684", type: "hls" }, // ลิงก์หลัก (1)
                { file: "http://xsmt.ccwu.cc/xsmt/smt.php?id=1788", type: "hls" }, // ลิงก์สำรอง (2)
                { file: "http://xsmt.ccwu.cc/xsmt/smt.php?id=2821", type: "hls" }, // ลิงก์สำรอง (3) แก้ไข: เติมเครื่องหมายจุลภาคคั่นตรงนี้เรียบร้อย
                { file: "http://xsmt.ccwu.cc/xsmt/smt.php?id=1789", type: "hls" }   // ลิงก์สำรอง (4)
            ],
            drm: false
        },
		{
            name: "ASTRO GRANDSTAND",
            logo: "https://www.lyngsat.com/logo/tv/aa/astro-grandstand-my.png",
            sources: [
                { file: "http://xsmt.ccwu.cc/xsmt/smt.php?id=1790", type: "hls" }, // ลิงก์หลัก (1)
                { file: "http://xsmt.ccwu.cc/xsmt/smt.php?id=2822", type: "hls" }, // ลิงก์สำรอง (2)
                { file: "https://rakyattv.my.id/donate/stream.php/.m3u8?id=astro-grandstand", type: "hls" }   // ลิงก์สำรอง (3)
            ],
            drm: false
        },
        {
            name: "ช่องตัวอย่าง 2 (แบบ DRM มีสำรอง)",
            logo: "https://via.placeholder.com/130x80",
            sources: [
                { file: "https://main.drm-server.com/live/ch2.mpd", type: "dash" },  // ลิงก์หลัก DRM
                { file: "https://backup.drm-server.com/live/ch2.mpd", type: "dash" } // ลิงก์สำรอง DRM
            ],
            drm: true,
            keyId: "ใส่ Key ID ที่นี่",
            key: "ใส่ Key ที่นี่"
        }
    ];

    let currentChannelIndex = 0; 

    function loadPlayer(index) {
        if (index < 0 || index >= channels.length) return;
        
        currentChannelIndex = index;
        const channel = channels[index];
        
        const config = {
            playlist: [{
                title: channel.name,
                image: channel.logo,
                sources: channel.sources 
            }],
            width: "100%",
            aspectratio: "16:9",
            autostart: true,
            mute: false
        };

        if (channel.drm) {
            config.playlist[0].drm = {
                clearkey: {
                    keyId: channel.keyId,
                    key: channel.key
                }
            };
        }

        const player = jwplayer("player").setup(config);

        player.on('error', function(e) {
            console.error("เกิดข้อผิดพลาดในการเล่นช่องนี้ (ลิงก์อาจจะเสียทั้งหมด):", e.message);
            
            let nextIndex = currentChannelIndex + 1;
            if (nextIndex < channels.length) {
                console.log("กำลังเปลี่ยนไปช่องถัดไปโดยอัตโนมัติ...");
                loadPlayer(nextIndex); 
            } else {
                console.log("หมดรายการช่องแล้ว ไม่สามารถไปต่อได้");
            }
        });
    }

    const channelList = document.getElementById("channel-list");
    channels.forEach((channel, idx) => {
        const div = document.createElement("div");
        div.className = "channel";
        const logoHtml = channel.logo 
            ? `<img src="${channel.logo}" alt="${channel.name}"><br>`
            : "";
        div.innerHTML = logoHtml + channel.name;
        div.onclick = () => loadPlayer(idx); 
        channelList.appendChild(div);
    });

    window.onload = () => {
        if (channels.length > 0) {
            loadPlayer(0);
        }
    };
</script>
</body>
</html>
