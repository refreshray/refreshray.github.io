<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My TV Browser (M3U Parser)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; background-color: #000; }
        .sidebar-trigger { position: absolute; top: 0; left: 0; width: 40px; height: 100%; z-index: 999; }
        .sidebar { position: absolute; top: 0; left: -340px; width: 320px; height: 100%; background: rgba(15, 15, 15, 0.95); box-shadow: 5px 0 15px rgba(0,0,0,0.7); transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1000; color: #fff; padding: 20px; display: flex; flex-direction: column; }
        .sidebar-trigger:hover + .sidebar, .sidebar:hover { left: 0; }
        .sidebar h2 { margin-bottom: 5px; font-size: 20px; color: #fff; }
        .channel-count { font-size: 12px; color: #888; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .channel-list { list-style: none; overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .channel-item { display: flex; align-items: center; padding: 12px; background: #1a1a1a; margin-bottom: 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .channel-item:hover, .channel-item:focus { background: #e50914; border-color: #fff; outline: none; transform: scale(1.02); }
        .channel-logo { width: 40px; height: 40px; object-fit: contain; margin-right: 12px; background: #111; border-radius: 4px; display: none; }
        .channel-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-msg { text-align: center; margin-top: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar-trigger"></div>

    <nav class="sidebar">
        <h2>ช่องรายการทีวี</h2>
        <div class="channel-count" id="count-text">กำลังโหลดรายการช่อง...</div>
        <ul class="channel-list" id="channel-container"></ul>
    </nav>

    <div class="video-container" data-shaka-player-container>
        <video autoplay id="video" data-shaka-player></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.js"></script>

    <script>
        const M3U_URL = 'https://github.com/cattv976/iptv/raw/refs/heads/main/cattv.m3u'; 
        let player;

        async function initPlayer() {
            const video = document.getElementById('video');
            const videoContainer = document.querySelector('[data-shaka-player-container]');
            
            player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, videoContainer, video);

            player.addEventListener('error', (event) => console.error('Player error:', event.detail));
            fetchAndParseM3U(M3U_URL);
        }

        async function fetchAndParseM3U(url) {
            const container = document.getElementById('channel-container');
            const countText = document.getElementById('count-text');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('ไม่สามารถโหลดไฟล์ M3U ได้');
                
                const text = await response.text();
                const channels = parseM3U(text);

                container.innerHTML = '';
                countText.innerText = `พบทั้งหมด ${channels.length} ช่องรายการ`;

                if (channels.length === 0) {
                    container.innerHTML = '<div class="status-msg">ไม่พบช่องรายการในไฟล์ หรือฟอร์แมตไฟล์ไม่ถูกต้อง</div>';
                    return;
                }

                channels.forEach((ch, index) => {
                    const li = document.createElement('li');
                    li.className = 'channel-item';
                    li.tabIndex = index + 1;
                    
                    if (ch.logo) {
                        const img = document.createElement('img');
                        img.className = 'channel-logo';
                        img.src = ch.logo;
                        img.style.display = 'block';
                        img.onerror = () => img.style.display = 'none';
                        li.appendChild(img);
                    }

                    const span = document.createElement('span');
                    span.className = 'channel-name';
                    span.innerText = ch.name;
                    li.appendChild(span);

                    li.addEventListener('click', () => playStream(ch.url));
                    li.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') playStream(ch.url);
                    });

                    container.appendChild(li);
                });

                if (channels.length > 0) {
                    playStream(channels[0].url);
                }

            } catch (error) {
                console.error(error);
                countText.innerText = 'เกิดข้อผิดพลาด';
                container.innerHTML = `<div class="status-msg">โหลดรายการล้มเหลว: ${error.message}</div>`;
            }
        }

        function parseM3U(m3uRaw) {
            // ปรับปรุงตรงนี้ให้ตัดบรรดทัดได้ทั้งแบบ Windows (\r\n) และ Linux (\n)
            const lines = m3uRaw.split(/\r?\n/);
            const channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const nameIndex = line.lastIndexOf(',');
                    const name = nameIndex !== -1 ? line.substring(nameIndex + 1).trim() : 'Unknown Channel';

                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const logo = logoMatch ? logoMatch[1] : null;

                    currentChannel = { name, logo };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            return channels;
        }

        async function playStream(url) {
            try {
                await player.load(url);
            } catch (error) {
                console.error('ไม่สามารถเล่นสตรีมนี้ได้:', error);
            }
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
