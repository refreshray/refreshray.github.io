<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

        jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 📺 ส่วนของเครื่องเล่นวิดีโอ (บังคับเต็มจอ 100%) */
        .player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #player {
            width: 100% !important;
            height: 100% !important;
        }

        /* 🖱️ พื้นที่ดักจับเมาส์ขอบซ้ายจอ (Invisible Trigger Zone) */
        .sidebar-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 100%;
            z-index: 999;
        }

        /* 🗂️ เมนูด้านซ้าย (Sidebar) */
        #sidebar {
            position: absolute;
            top: 0;
            left: -340px; /* ซ่อนไว้ด้านซ้าย */
            width: 320px;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* กลไกเมื่อเมาส์ Hover ที่พื้นที่ดักจับ หรือที่ตัว Sidebar ให้สไลด์เมนูออกมา */
        .sidebar-trigger:hover + #sidebar,
        #sidebar:hover {
            left: 0;
        }

        #sidebar h2 {
            color: orange;
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        /* 📜 รายการกล่องช่องทีวี (เปลี่ยนเป็นแนวตั้ง) */
        #channel-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        /* ปรับแต่งความสวยงามของ Scrollbar บนเมนู */
        #channel-list::-webkit-scrollbar {
            width: 6px;
        }
        #channel-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        /* 🔳 ปุ่มช่องทีวีแต่ละช่อง */
        .channel {
            cursor: pointer;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            text-align: center;
            width: 100%; /* เต็มความกว้างของเมนู */
            min-height: 70px;
            display: flex;
            justify-content: flex-start; /* จัดโลโก้และข้อความเรียงไปทางขวา */
            align-items: center;
            transition: all 0.2s;
            overflow: hidden;
            gap: 12px;
        }
        .channel img {
            width: 50px;
            height: 40px;
            object-fit: contain;
            display: block;
            background: #111;
            border-radius: 4px;
        }
        .channel-name {
            font-size: 15px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel:hover, .channel:focus {
            background: orange;
            color: black;
            border-color: #fff;
            transform: scale(1.02);
            outline: none;
        }

        /* 🔘 ปุ่มเริ่มเล่นตรงกลางจอตอนเปิดเว็บครั้งแรก */
        #startPlayback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            padding: 15px 35px;
            background: orange;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

        function loadPlayer(channel) {
            const config = {
                file: channel.file,
                width: "100%",
                height: "100%",
                autostart: true,
                mute: false
            };

            // ถ้าเป็นไฟล์ .mpd + drm
            if (channel.drm) {
                config.type = "dash";
                config.drm = {
                    clearkey: {   /* ✅ แก้ไขจุดนี้เรียบร้อยแล้ว */
                        keyId: channel.keyId,
                        key: channel.key
                    }
                };
            } else {
                // ถ้าไฟล์ .m3u8 (HLS)
                config.type = "hls";
            }

            jwplayer("player").setup(config);
        }

        // สร้างปุ่มเลือกช่องภายใน Sidebar ลิสต์แนวตั้ง
        const channelList = document.getElementById("channel-list");
        channels.forEach((channel, idx) => {
            const div = document.createElement("div");
            div.className = "channel";
            div.tabIndex = idx + 1; // รองรับการกดปุ่มเลื่อนที่รีโมททีวี
            
            // ตรวจสอบโลโก้ ถ้าไม่มีให้สร้างกล่องเปล่าไว้กันพื้นที่เบี้ยว
            const logoHtml = channel.logo 
                ? `<img src="${channel.logo}" alt="${channel.name}">`
                : `<div style="width:50px; height:40px; background:#333; border-radius:4px; display:flex; justify-content:center; align-items:center; font-size:10px; color:#aaa;">No Pix</div>`;
            
            div.innerHTML = logoHtml + `<span class="channel-name">${channel.name}</span>`;
            
            // คลิกหรือกดเลือกช่อง
            div.onclick = () => loadPlayer(channel);
            div.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loadPlayer(channel);
            });
            
            channelList.appendChild(div);
        });

        // เมื่อกดปุ่มเริ่มต้นเล่นตรงกลางจอ
        document.getElementById("startPlayback").onclick = () => {
            if(channels.length > 0) {
                loadPlayer(channels[0]); // เล่นช่องแรกเป็น default
            }
            document.getElementById("startPlayback").style.display = "none";
        };
    </script>
