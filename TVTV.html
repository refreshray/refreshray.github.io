    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 📺 ส่วนของเครื่องเล่นวิดีโอ (บังคับเต็มจอ 100%) */
        .player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* 🖱️ พื้นที่ดักจับเมาส์ขอบซ้ายจอ (Invisible Trigger Zone) */
        .sidebar-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 100%;
            z-index: 999;
        }

        /* 🗂️ เมนูด้านซ้าย (Sidebar) */
        #sidebar {
            position: absolute;
            top: 0;
            left: -340px;
            width: 320px;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            box-shadow: 5px 0 15px rgba(0,0,0,0.7);
            transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-trigger:hover + #sidebar,
        #sidebar:hover {
            left: 0;
        }

        #sidebar h2 {
            color: orange;
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        #channel-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        #channel-list::-webkit-scrollbar {
            width: 6px;
        }
        #channel-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .channel {
            cursor: pointer;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            min-height: 70px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            transition: all 0.2s;
            overflow: hidden;
            gap: 12px;
        }
        .channel img {
            width: 50px;
            height: 40px;
            object-fit: contain;
            display: block;
            background: #111;
            border-radius: 4px;
        }
        .channel-name {
            font-size: 15px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel:hover, .channel:focus {
            background: orange;
            color: black;
            border-color: #fff;
            transform: scale(1.02);
            outline: none;
        }

        #startPlayback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            padding: 15px 35px;
            background: orange;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

  				drm: false

        // ประกาศสร้างตัวเล่น Video.js
        const player = videojs('tv-player', {
            fluid: false,
            autoplay: true,
            controls: true
        });

        // เปิดใช้งานระบบ EME สำหรับ ClearKey DRM
        player.eme();

        function loadPlayer(channel) {
            let type = "application/x-mpegURL"; // ค่าเริ่มต้นสำหรับ .m3u8 (HLS)
            
            if (channel.file.includes('.mpd')) {
                type = "application/dash+xml"; // ค่าสำหรับ .mpd (DASH)
            }

            const srcOptions = {
                src: channel.file,
                type: type
            };

            // ตั้งค่า DRM ClearKey หากกำหนดไว้เป็น true
            if (channel.drm) {
                srcOptions.keySystems = {
                    'org.w3.clearkey': {
                        'audio/mp4': {
                            keyId: new Uint8Array(matchKeyToBytes(channel.keyId)),
                            key: new Uint8Array(matchKeyToBytes(channel.key))
                        },
                        'video/mp4': {
                            keyId: new Uint8Array(matchKeyToBytes(channel.keyId)),
                            key: new Uint8Array(matchKeyToBytes(channel.key))
                        }
                    }
                };
            }

            player.src(srcOptions);
            player.ready(function() {
                player.play().catch(function(error) {
                    console.log("Autoplay บล็อกเสียง ให้ผู้ใช้กดเปิดเอง:", error);
                });
            });
        }

        // ฟังก์ชันแปลงข้อความ Key Hex เป็น Bytes สำหรับระบบ ClearKey
        function matchKeyToBytes(hexString) {
            const result = [];
            for (let i = 0; i < hexString.length; i += 2) {
                result.push(parseInt(hexString.substr(i, 2), 16));
            }
            return result;
        }

        // สร้างปุ่มเลือกช่องภายใน Sidebar ลิสต์แนวตั้ง
        const channelList = document.getElementById("channel-list");
        channels.forEach((channel, idx) => {
            const div = document.createElement("div");
            div.className = "channel";
            div.tabIndex = idx + 1;
            
            const logoHtml = channel.logo 
                ? `<img src="${channel.logo}" alt="${channel.name}">`
                : `<div style="width:50px; height:40px; background:#333; border-radius:4px; display:flex; justify-content:center; align-items:center; font-size:10px; color:#aaa;">No Pix</div>`;
            
            div.innerHTML = logoHtml + `<span class="channel-name">${channel.name}</span>`;
            
            div.onclick = () => loadPlayer(channel);
            div.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loadPlayer(channel);
            });
            
            channelList.appendChild(div);
        });

        // ปุ่มเริ่มต้นเล่นตรงกลางจอตอนเปิดเว็บ
        document.getElementById("startPlayback").onclick = () => {
            if(channels.length > 0) {
                loadPlayer(channels[0]);
            }
            document.getElementById("startPlayback").style.display = "none";
        };
