<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Documentary Player (With Covers)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #05050a;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* แถบรายชื่อเมนูทางด้านซ้าย */
        .sidebar {
            width: 350px; /* เพิ่มความกว้างเล็กน้อยเพื่อรองรับรูปภาพ */
            background-color: #0c1033; /* ปรับโทนสีน้ำเงินเข้มตามภาพตัวอย่าง */
            display: flex;
            flex-direction: column;
            border-right: 2px solid #1a1f4c;
        }

        .sidebar-header {
            padding: 15px;
            background-color: #080a21;
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 1px solid #1a1f4c;
            color: #4facfe;
            text-align: center;
        }

        /* ช่องค้นหาภายในแถบเมนู */
        .search-box {
            padding: 10px;
            background-color: #080a21;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background-color: #05050a;
            border: 1px solid #1a1f4c;
            border-radius: 4px;
            color: #fff;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #00f2fe;
        }

        /* รายการสารคดี */
        .playlist {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        /* ปรับแต่งความสวยงามของแถบเลื่อน (Scrollbar) */
        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background-color: #1a1f4c;
            border-radius: 3px;
        }

        .playlist-item {
            padding: 10px 15px;
            border-bottom: 1px solid #14194c;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center; /* จัดให้รูปภาพและข้อความอยู่กึ่งกลางในแนวตั้ง */
            gap: 12px; /* เพิ่มระยะห่างระหว่างรูปภาพและข้อความ */
        }

        .playlist-item:hover {
            background-color: #14194c;
        }

        /* สถานะตอนที่กำลังกดเลือกดูช่องนั้นอยู่ */
        .playlist-item.active {
            background-color: #002b5c;
            border-left: 4px solid #00f2fe;
        }

        /* สไตล์สำหรับรูปปก (Thumbnail) */
        .thumbnail {
            width: 80px; /* กำหนดความกว้างรูปภาพ */
            height: 45px; /* กำหนดความสูงรูปภาพ (อัตราส่วน 16:9) */
            background-color: #000; /* สีพื้นหลังในกรณีกรณีโหลดรูปไม่ได้ */
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            border: 1px solid #1a1f4c;
        }

        /* ส่วนข้อมูลข้อความ */
        .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1; /* ให้ส่วนข้อมูลขยายเต็มพื้นที่ที่เหลือ */
        }

        .title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #e0e6ed;
            /* ทำให้ข้อความยาวเกินไปกลายเป็น ... */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #8fa0b5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ส่วนพื้นที่เล่นวิดีโอ (อยู่ด้านขวา) */
        .video-container {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">DOCUMENTARIES</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search Episodes...">
        </div>
        <ul class="playlist" id="playlist">
            </ul>
    </div>

    <div class="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <script>
        // ข้อมูลรายชื่อสารคดีและลิ้งก์ M3U8 (คุณสามารถมาเพิ่ม/แก้ไข ลิงก์ของคุณตรงนี้ได้เลย)
        // **เพิ่ม `thumbnailUrl` สำหรับรูปปกแต่ละช่อง**
        const playlistData = [
            {
                title: "สารคดีมนุษย์",
                subtitle: "วิทยาศาสตร์อัศจรรย์ - ชีวิตอมตะ",
                url: "https://nextstep-sooyp4zfonli.stream-playlist.byteark.com/streams/TADssYpuZPfC/playlist.m3u8",
                thumbnailUrl: "https://d3ffi1kkogkk1a.cloudfront.net/imageStore/img_1665393712470.jpg" // ตัวอย่างรูปภาพ
            },
            {
                title: "สารคดีมนุษย์",
                subtitle: "สแตนลีย์กับสุดยอดมนุษย์ - มนุษย์ตู้เพลง",
                url: "https://nextstep-sooyp4zfonli.stream-playlist.byteark.com/streams/TADsbKzxE5hQ/playlist.m3u8",
                thumbnailUrl: "https://d3ffi1kkogkk1a.cloudfront.net/imageStore/img_1671735708207.jpg" // ตัวอย่างรูปภาพ
            },
            {
                title: "สารคดีสิ่งมีชีวิต",
                subtitle: "ความลับของวิวัฒนาการ - งู",
                url: "https://nextstep-sooyp4zfonli.stream-playlist.byteark.com/streams/TADsPzBZNn9E/playlist.m3u8",
                thumbnailUrl: "https://d3ffi1kkogkk1a.cloudfront.net/imageStore/img_1670312160435.jpg" // ตัวอย่างรูปภาพ
            },
            {
                title: "เกมคู่ชีวิตวิทยาศาสตร์",
                subtitle: "อาวุธลับของมนุษย์",
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", // ใช้ URL เดิมเป็นตัวอย่าง
                thumbnailUrl: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?q=80&w=400" // ตัวอย่างรูปภาพ
            },
            {
                title: "สารคดีวงจรแห่งชีวิต",
                subtitle: "ตะลุยดินแดนภูเขาไฟ - ภูเขาไฟนรก",
                url: "https://nextstep-sooyp4zfonli.stream-playlist.byteark.com/streams/TADsQUiW4vVz/playlist.m3u8", // ใช้ URL เดิมเป็นตัวอย่าง
                thumbnailUrl: "https://d3ffi1kkogkk1a.cloudfront.net/imageStore/img_1670380056788.jpg" // ตัวอย่างรูปภาพ
            }
        ];

        const video = document.getElementById('video');
        const playlistElem = document.getElementById('playlist');
        const searchInput = document.getElementById('search');
        let hls = null;

        // ฟังก์ชันสำหรับสั่งเล่นวิดีโอ M3U8
        function playM3u8(url) {
            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); 
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // ฟังก์ชันสร้างรายการเมนูในแถบด้านซ้าย
        // **ปรับปรุงเพื่อให้รองรับการแสดงรูปปก**
        function renderPlaylist(data) {
            playlistElem.innerHTML = '';
            data.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'playlist-item';
                
                // สร้างส่วน HTML ภายในรายการ
                li.innerHTML = `
                    <div class="thumbnail" style="background-image: url('${item.thumbnailUrl}');"></div>
                    <div class="info">
                        <span class="title">${item.title}</span>
                        <span class="subtitle">- ${item.subtitle}</span>
                    </div>
                `;
                
                li.addEventListener('click', () => {
                    document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    playM3u8(item.url);
                });

                playlistElem.appendChild(li);
            });
        }

        // ค้นหาแบบ Real-time
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredData = playlistData.filter(item => 
                item.title.toLowerCase().includes(keyword) || 
                item.subtitle.toLowerCase().includes(keyword)
            );
            renderPlaylist(filteredData);
        });

        // เปิดหน้าเว็บมาให้โหลดรายการและเล่นรายการแรกทันที
        renderPlaylist(playlistData);
        if(playlistData.length > 0) {
            playM3u8(playlistData[0].url);
            setTimeout(() => {
                if(playlistElem.firstElementChild) playlistElem.firstElementChild.classList.add('active');
            }, 100);
        }
    </script>
</body>
</html>
