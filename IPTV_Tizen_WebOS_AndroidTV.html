const list=document.getElementById('list'); let idx=0;
channels.forEach((c,i)=>{let d=document.createElement('div');d.className='item';d.textContent='['+c.group+'] '+c.name;d.onclick=()=>play(i);list.appendChild(d);});
function focusItem(){document.querySelectorAll('.item').forEach((e,i)=>e.classList.toggle('focus',i===idx));document.querySelectorAll('.item')[idx]?.scrollIntoView({block:'nearest'});}
function play(i){idx=i;focusItem();document.getElementById('v').src=channels[i].url;}
document.addEventListener('keydown',e=>{if(e.keyCode===40){idx=Math.min(idx+1,channels.length-1);focusItem();}
if(e.keyCode===38){idx=Math.max(idx-1,0);focusItem();}
if(e.keyCode===13){play(idx);}});
focusItem(); if(channels.length) play(0);
